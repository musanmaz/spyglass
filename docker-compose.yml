services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    networks: [frontend]

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://spyglass:${DB_PASSWORD}@db:5432/spyglass
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - API_PROXY_TOKEN=${API_PROXY_TOKEN}
      - DEVICE_SSH_USERNAME=${DEVICE_SSH_USERNAME}
      - DEVICE_SSH_PASSWORD=${DEVICE_SSH_PASSWORD}
      - ENVIRONMENT=production
      - REQUIRE_API_TOKEN=${REQUIRE_API_TOKEN:-true}
      - CORS_ORIGINS=${CORS_ORIGINS:-[]}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-[]}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    volumes:
      - ./config:/app/config:ro
    ports:
      - "127.0.0.1:8000:8000"
    networks: [frontend, backend]

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: spyglass
      POSTGRES_USER: spyglass
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spyglass"]
      interval: 10s
    networks: [backend]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command CONFIG ""
      --rename-command DEBUG ""
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
    networks: [backend]

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports: ["443:443", "80:80"]
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    environment:
      - API_PROXY_TOKEN=${API_PROXY_TOKEN}
      - SERVER_NAME=${SERVER_NAME:-localhost}
    command: >
      /bin/sh -c "envsubst '$$API_PROXY_TOKEN $$SERVER_NAME' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    depends_on: [frontend, backend]
    networks: [frontend]

volumes:
  postgres_data:

networks:
  frontend:
  backend:
