devices:
  - id: example-router
    name: "Example Router"
    host: "0.0.0.0"
    platform: cisco_xr
    username: "${DEVICE_SSH_USERNAME}"
    password: "${DEVICE_SSH_PASSWORD}"
    location:
      city: "Example City"
      country: "US"
      facility: "Example DC"
      coordinates: [0.0, 0.0]
    network:
      asn: 65000
      as_name: "Example Network"
      ipv4_source: ""
      ipv6_source: ""
    ssh:
      port: 22
      timeout: 10
    directives:
      - ping
      - traceroute
      - bgp_route
