    - "127.0.0.0/8"
    - "169.254.0.0/16"
    - "172.16.0.0/12"
    - "192.0.0.0/24"
    - "192.0.2.0/24"
    - "192.168.0.0/16"
    - "198.18.0.0/15"
    - "198.51.100.0/24"
    - "203.0.113.0/24"
    - "224.0.0.0/4"
    - "240.0.0.0/4"
